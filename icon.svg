<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd9ee"/>
      <stop offset=".55" stop-color="#ffc2e3"/>
      <stop offset="1" stop-color="#bda4ee"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- sparkles -->
  <g fill="#ffffff" opacity=".8">
    <path d="M88 96l9 20 20 9-20 9-9 20-9-20-20-9 20-9z"/>
    <circle cx="436" cy="100" r="8"/><circle cx="116" cy="446" r="7"/><circle cx="456" cy="402" r="6"/>
  </g>
  <!-- ears -->
  <path d="M150 152 L120 58 L244 130 Z" fill="#ffffff"/>
  <path d="M362 152 L392 58 L268 130 Z" fill="#ffffff"/>
  <path d="M167 146 L152 92 L224 134 Z" fill="#ffc2d6"/>
  <path d="M345 146 L360 92 L288 134 Z" fill="#ffc2d6"/>
  <!-- head -->
  <ellipse cx="256" cy="282" rx="166" ry="150" fill="#ffffff"/>
  <!-- eyes -->
  <ellipse cx="200" cy="282" rx="29" ry="37" fill="#5a4a78"/>
  <ellipse cx="312" cy="282" rx="29" ry="37" fill="#5a4a78"/>
  <circle cx="211" cy="266" r="12" fill="#fff"/><circle cx="323" cy="266" r="12" fill="#fff"/>
  <circle cx="189" cy="295" r="6.5" fill="#fff" opacity=".85"/><circle cx="301" cy="295" r="6.5" fill="#fff" opacity=".85"/>
  <!-- blush -->
  <ellipse cx="158" cy="322" rx="27" ry="16" fill="#ff8fb8" opacity=".55"/>
  <ellipse cx="354" cy="322" rx="27" ry="16" fill="#ff8fb8" opacity=".55"/>
  <!-- nose + mouth -->
  <path d="M238 314 L274 314 L256 336 Z" fill="#ff8fb8"/>
  <path d="M256 336 q-19 19 -36 7 M256 336 q19 19 36 7" stroke="#9a7aa0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <g stroke="#cdbbe0" stroke-width="7" stroke-linecap="round" opacity=".85">
    <line x1="118" y1="292" x2="52" y2="276"/><line x1="118" y1="314" x2="52" y2="326"/>
    <line x1="394" y1="292" x2="460" y2="276"/><line x1="394" y1="314" x2="460" y2="326"/>
  </g>
  <!-- gold coin -->
  <g transform="translate(392 396)">
    <circle r="64" fill="#ffce5c" stroke="#f2b32e" stroke-width="9"/>
    <circle r="50" fill="none" stroke="#f2b32e" stroke-width="3" opacity=".6"/>
    <text x="0" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="74" font-weight="900" fill="#b8770f">$</text>
  </g>
